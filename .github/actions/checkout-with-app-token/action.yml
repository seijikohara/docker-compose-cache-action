name: Checkout with App token
description: Mint a GitHub App installation token and check out the repository with it.

inputs:
  app-id:
    description: GitHub App ID used to mint the installation token.
    required: true
  private-key:
    description: GitHub App private key used to mint the installation token.
    required: true
  fetch-depth:
    description: Number of commits to fetch. 0 fetches the full history.
    required: false
    default: '1'
  fetch-tags:
    description: Whether to also fetch tags during checkout.
    required: false
    default: 'false'

outputs:
  token:
    description: The minted App installation access token.
    value: ${{ steps.app-token.outputs.token }}
  app-slug:
    description: The slug of the GitHub App (e.g. `my-bot`).
    value: ${{ steps.app-token.outputs.app-slug }}

runs:
  using: composite
  steps:
    - name: Generate GitHub App Token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
        fetch-tags: ${{ inputs.fetch-tags }}
        token: ${{ steps.app-token.outputs.token }}
