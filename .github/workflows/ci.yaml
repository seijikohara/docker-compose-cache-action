name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with App token
        id: setup
        uses: ./.github/actions/checkout-with-app-token
        with:
          app-id: ${{ vars.DEV_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.DEV_AUTOMATION_PRIVATE_KEY }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      - name: Package action using ncc
        run: npm run package

      - name: Commit generated files
        if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'development-automation-bot[bot]'"
        env:
          GITHUB_TOKEN: ${{ steps.setup.outputs.token }}
          BOT_NAME: ${{ steps.setup.outputs.app-slug }}[bot]
          BOT_EMAIL: ${{ steps.setup.outputs.app-slug }}[bot]@users.noreply.github.com
        run: |
          set -euo pipefail

          git add dist/
          if git diff --cached --quiet; then
            echo "No dist changes detected"
            exit 0
          fi

          npm version patch --no-git-tag-version
          git add package.json package-lock.json

          git config --global user.name "$BOT_NAME"
          git config --global user.email "$BOT_EMAIL"
          git commit -m "build: update generated files"
          git push
          echo "Committed generated files"

      - name: Create release tags
        if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor == 'development-automation-bot[bot]'"
        uses: ./.github/actions/sync-release-tags
        with:
          bot-name: ${{ steps.setup.outputs.app-slug }}[bot]
          bot-email: ${{ steps.setup.outputs.app-slug }}[bot]@users.noreply.github.com

  build-and-test-summary:
    name: Build and Test Summary
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Report successful completion
        run: |
          echo "### Build and Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All build and test jobs for Node.js completed successfully." >> $GITHUB_STEP_SUMMARY
