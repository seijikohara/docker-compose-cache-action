name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.DEV_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.DEV_AUTOMATION_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      - name: Package action using ncc
        run: npm run package

      - name: Commit generated files
        if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'development-automation-bot[bot]'"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          git add dist/
          if git diff --cached --quiet; then
            echo "No dist changes detected"
            exit 0
          fi

          npm version patch --no-git-tag-version
          git add package.json package-lock.json

          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git commit -m "build: update generated files"
          git push
          echo "Committed generated files"

      - name: Create release tags
        if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor == 'development-automation-bot[bot]'"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          current_version=$(node -p "require('./package.json').version")
          current_commit=$(git rev-parse HEAD)
          version_tag="v${current_version}"
          major_tag="v${current_version%%.*}"

          existing_version_commit=""
          if git rev-parse --verify "refs/tags/${version_tag}" >/dev/null 2>&1; then
            existing_version_commit=$(git rev-list -n 1 "refs/tags/${version_tag}")
          fi

          if [[ -n "$existing_version_commit" && "$existing_version_commit" != "$current_commit" ]]; then
            echo "::error::Release tag ${version_tag} already exists on a different commit (${existing_version_commit})."
            exit 1
          fi

          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

          if [[ -z "$existing_version_commit" ]]; then
            git tag -a "${version_tag}" "${current_commit}" -m "chore(release): publish ${version_tag}"
            git push origin "${version_tag}"
          fi

          git tag -fa "${major_tag}" "${current_commit}" -m "chore(release): update ${major_tag} to ${version_tag}"
          git push --force origin "${major_tag}"

          short_sha=$(git rev-parse --short "${current_commit}")
          {
            echo "### 📌 Release Tags"
            echo ""
            echo "| Tag | Commit SHA |"
            echo "|-----|------------|"
            echo "| \`${version_tag}\` | \`${short_sha}\` |"
            echo "| \`${major_tag}\` | \`${short_sha}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  build-and-test-summary:
    name: Build and Test Summary
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Report successful completion
        run: |
          echo "### Build and Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All build and test jobs for Node.js completed successfully." >> $GITHUB_STEP_SUMMARY
