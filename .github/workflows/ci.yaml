name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.DEV_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.DEV_AUTOMATION_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      - name: Package action using ncc
        run: npm run package

      - name: Commit generated files
        if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.head_commit.message != 'build: update generated files'"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          if [[ -n "$(git status --porcelain -- dist/)" ]]; then
            npm version patch --no-git-tag-version

            git add dist/ package.json package-lock.json

            if git diff --cached --quiet; then
              echo "No generated changes detected"
              exit 0
            fi

            git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
            git config --global user.email '${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
            git commit -m "build: update generated files"
            git push
            echo "Committed generated files"
          else
            echo "No dist changes detected"
          fi

  build-and-test-summary:
    name: Build and Test Summary
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Report successful completion
        run: |
          echo "### Build and Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All build and test jobs for Node.js completed successfully." >> $GITHUB_STEP_SUMMARY
