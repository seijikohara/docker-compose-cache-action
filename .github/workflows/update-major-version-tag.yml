name: Update Release Tags

# Auto-tagging on the bot's version-bump commit is handled inside the
# CI workflow's `Create release tags` step. This workflow is kept as
# a manual fallback to re-sync v{version} and v{major} tags against
# the current main HEAD when needed.
on:
  workflow_dispatch:

concurrency:
  group: update-release-tags
  cancel-in-progress: true

jobs:
  update-release-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout with App token
        id: setup
        uses: ./.github/actions/checkout-with-app-token
        with:
          app-id: ${{ vars.DEV_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.DEV_AUTOMATION_PRIVATE_KEY }}
          fetch-depth: 0
          fetch-tags: true

      - name: Sync release tags
        uses: ./.github/actions/sync-release-tags
        with:
          bot-name: ${{ steps.setup.outputs.app-slug }}[bot]
          bot-email: ${{ steps.setup.outputs.app-slug }}[bot]@users.noreply.github.com
