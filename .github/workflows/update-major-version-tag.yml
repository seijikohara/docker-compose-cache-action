name: Update Release Tags

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'dist/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  update-release-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.DEV_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.DEV_AUTOMATION_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch all tags
        run: git fetch --tags

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Sync release tags
        run: |
          set -euo pipefail

          current_version=$(node -p "require('./package.json').version")
          current_commit=$(git rev-parse HEAD)
          version_tag="v${current_version}"
          major_tag="v${current_version%%.*}"

          previous_version=""
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            previous_version=$(git show HEAD^:package.json | node -e "const fs = require('node:fs'); const input = fs.readFileSync(0, 'utf8'); process.stdout.write(JSON.parse(input).version)")
          fi

          echo "### 📌 Updating Release Tags" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Commit SHA |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------------|" >> $GITHUB_STEP_SUMMARY

          if [[ "$current_version" == "$previous_version" ]]; then
            echo "| \`$version_tag\` | No version change detected |" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          git tag -fa "$version_tag" "$current_commit" -m "chore(release): publish $version_tag"
          git tag -fa "$major_tag" "$current_commit" -m "chore(release): update $major_tag to $version_tag"
          git push --force origin "$version_tag" "$major_tag"

          short_sha=$(git rev-parse --short "$current_commit")
          echo "| \`$version_tag\` | \`$short_sha\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`$major_tag\` | \`$short_sha\` |" >> $GITHUB_STEP_SUMMARY
