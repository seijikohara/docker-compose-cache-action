name: Update Release Tags

# Auto-tagging on the bot's version-bump commit is handled inside the
# CI workflow's `Create release tags` step. This workflow is kept as
# a manual fallback to re-sync v{version} and v{major} tags against
# the current main HEAD when needed.
on:
  workflow_dispatch:

concurrency:
  group: update-release-tags
  cancel-in-progress: true

jobs:
  update-release-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.DEV_AUTOMATION_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Sync release tags
        uses: ./.github/actions/sync-release-tags
        with:
          bot-name: ${{ steps.app-token.outputs.app-slug }}[bot]
          bot-email: ${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com
          github-token: ${{ steps.app-token.outputs.token }}
