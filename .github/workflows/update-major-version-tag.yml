name: Update Release Tags

# Auto-tagging on bot push is handled inside the CI workflow's
# `Create release tags` step. This workflow is kept as a manual
# fallback to re-sync v{version} and v{major} tags against the
# current main HEAD when needed.
on:
  workflow_dispatch:

concurrency:
  group: update-release-tags
  cancel-in-progress: true

jobs:
  update-release-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.DEV_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.DEV_AUTOMATION_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Sync release tags
        run: |
          set -euo pipefail

          current_version=$(node -p "require('./package.json').version")
          current_commit=$(git rev-parse HEAD)
          version_tag="v${current_version}"
          major_tag="v${current_version%%.*}"

          echo "### 📌 Updating Release Tags" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Commit SHA |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------------|" >> $GITHUB_STEP_SUMMARY

          existing_version_commit=""
          if git rev-parse --verify "refs/tags/${version_tag}" >/dev/null 2>&1; then
            existing_version_commit=$(git rev-list -n 1 "refs/tags/${version_tag}")
          fi

          if [[ -n "$existing_version_commit" && "$existing_version_commit" != "$current_commit" ]]; then
            echo "::error::Release tag ${version_tag} already exists on a different commit (${existing_version_commit})."
            exit 1
          fi

          if [[ -z "$existing_version_commit" ]]; then
            git tag -a "${version_tag}" "${current_commit}" -m "chore(release): publish ${version_tag}"
            git push origin "${version_tag}"
          fi

          git tag -fa "${major_tag}" "${current_commit}" -m "chore(release): update ${major_tag} to ${version_tag}"
          git push --force origin "${major_tag}"

          short_sha=$(git rev-parse --short "${current_commit}")
          echo "| \`${version_tag}\` | \`${short_sha}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${major_tag}\` | \`${short_sha}\` |" >> $GITHUB_STEP_SUMMARY
